<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Love Carousel</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Raleway&family=Playfair+Display&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="db.js"></script>
</head>
<body>

<div class="bokeh-background">
    <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
</div>

<div class="gallery-wrapper layout-circular" id="gallery-wrapper">
    <div class="carousel">
        <!-- Items are generated dynamically by action.js -->
    </div>
</div>

<!-- Floating Controls Panel -->
<div class="controls-panel">
    <div id="autoplay-control" class="control-btn pulse" title="Auto Play">
        <span class="control-icon">▶️</span>
    </div>
    <div id="music-control" class="control-btn pulse" title="Play Music">
        <span class="control-icon">🎵</span>
    </div>
</div>

<div class="cursor"></div>
<div class="cursor cursor2"></div>

<audio id="bg-music" loop>
</audio>


<script src="action.js"></script>


</body>
</html>
